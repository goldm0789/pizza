<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피자나라 경제교실</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    .animate-scale-up {
      animation: scaleUp 0.25s ease-out forwards;
    }
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    /* 스크롤바 숨기기 (선택사항) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="min-h-screen bg-orange-50/50 text-slate-800 flex flex-col selection:bg-orange-200">

  <div id="app" class="flex-grow flex flex-col">
    <!-- 동적 화면이 그려지는 영역 -->
  </div>


  <!-- Firebase 및 핵심 애플리케이션 라이브러리 모듈 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ==========================================
    // 1. Firebase 전용 설정 및 연동 템플릿
    // ==========================================
    let firebaseConfig;
    let appId = 'pizza-economy-class';

    try {
      firebaseConfig = JSON.parse(__firebase_config);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'pizza-economy-class';
    } catch (e) {
      // ⚠️ 중요: 선생님의 활성화된 파이어베이스 키 정보를 완벽히 내장 유지합니다.
      firebaseConfig = {
        apiKey: "AIzaSyBHLe_wG_zRkQTfz_1Rq2CGKrSSGDX4b10",
        authDomain: "pizza-economy-class.firebaseapp.com",
        projectId: "pizza-economy-class",
        storageBucket: "pizza-economy-class.firebasestorage.app",
        messagingSenderId: "253898972716",
        appId: "1:253898972716:web:5433d5ec549143c0f37b89"
      };
    }

    const appInstance = initializeApp(firebaseConfig);
    const auth = getAuth(appInstance);
    const db = getFirestore(appInstance);

    // [피드백 반영]: 자재 한도 및 소비 한도 대폭 상향 설정
    const MAX_MAKING_BUDGET = 30000; // 피자 최대 제작 예산 (₩30,000)
    const MAX_BUYING_BUDGET = 50000; // 피자 최대 소비 예산 (₩50,000)

    // [피드백 반영]: 대폭 보강 및 수정된 18종의 프리미엄 식재료 도감
    const INGREDIENTS = [
      // 1. 소스류 (도우 바닥 색상 변경)
      { id: 'tomato_sauce', name: '토마토 소스', price: 1000, emoji: '🍅', category: 'sauce' },
      { id: 'cream_sauce', name: '크림 소스', price: 1500, emoji: '🥛', category: 'sauce' },
      { id: 'bbq_sauce', name: '바베큐 소스', price: 1800, emoji: '🍯', category: 'sauce' },
      
      // 2. 도우 / 크러스트 엣지 옵션
      { id: 'cheese_crust', name: '치즈 크러스트 엣지', price: 3000, emoji: '🥯', category: 'edge' },
      { id: 'sweet_potato_crust', name: '고구마무스 엣지', price: 2500, emoji: '🍠', category: 'edge' },

      // 3. 치즈류
      { id: 'mozzarella', name: '모짜렐라 치즈 가루', price: 2000, emoji: '🧀', category: 'cheese' },
      { id: 'cheddar', name: '체다 치즈 큐브', price: 1500, emoji: '💛', category: 'cheese' },
      { id: 'ricotta', name: '리코타 치즈 덩어리', price: 2500, emoji: '⚪', category: 'cheese' },

      // 4. 고기 / 프리미엄 육류 토핑
      { id: 'hanwoo', name: '명품 한우 토핑', price: 5000, emoji: '🥩', category: 'meat' },
      { id: 'bulgogi', name: '단짠 숯불 불고기', price: 3500, emoji: '🤎', category: 'meat' },
      { id: 'pork_belly', name: '고소한 대패 삼겹살', price: 3000, emoji: '🍖', category: 'meat' },
      { id: 'bacon', name: '스모크 베이컨', price: 2500, emoji: '🥓', category: 'meat' },

      // 5. 해산물 토핑
      { id: 'shrimp', name: '통통 자숙 새우살', price: 4000, emoji: '🦐', category: 'seafood' },
      { id: 'squid', name: '쫄깃 오징어링', price: 2000, emoji: '⚪', category: 'seafood' },

      // 6. 채소 / 과일 / 건강 옵션
      { id: 'potato', name: '포슬포슬 감자슬라이스', price: 1500, emoji: '🥔', category: 'veg' },
      { id: 'sweet_potato_paste', name: '달콤 고구마무스 조각', price: 2000, emoji: '🍠', category: 'veg' },
      { id: 'broccoli', name: '파릇 아삭 브로콜리', price: 1000, emoji: '🥦', category: 'veg' },
      { id: 'mushroom', name: '버섯 슬라이스 단면', price: 1200, emoji: '🍄', category: 'veg' },
      { id: 'onion', name: '달콤한 국산 양파즙', price: 800, emoji: '🧅', category: 'veg' },
      { id: 'pineapple', name: '슬라이스 파인애플', price: 1500, emoji: '🍍', category: 'veg' },
      { id: 'pepper', name: '피망 슬라이스', price: 1000, emoji: '🟢', category: 'veg' },

      // [피드백 반영]: 사이드 메뉴 카테고리로 쌀밥, 갈릭 마요, 피클, 콜라 이관 격리
      { id: 'rice', name: '고소한 갈릭 쌀밥 (사이드)', price: 1000, emoji: '🍚', category: 'side' },
      { id: 'garlic_mayo', name: '갈릭디핑 마요소스 (사이드)', price: 1200, emoji: '💛', category: 'side' },
      { id: 'pickle', name: '아삭 피클 (사이드)', price: 500, emoji: '🥒', category: 'side' },
      { id: 'cola', name: '시원한 캔콜라 (사이드)', price: 500, emoji: '🥤', category: 'side' },
      { id: 'single_pepperoni', name: '낱개 페퍼로니 한장', price: 500, emoji: '🔴', category: 'meat' },
      { id: 'single_olive', name: '블랙 올리브 링', price: 500, emoji: '🖤', category: 'veg' }, // 올리브 링 명칭 수정
    ];

    const TOPPING_SPREAD_PRESETS = [
      { r: 0.18, theta: 25 }, { r: 0.35, theta: 85 }, { r: 0.45, theta: 145 },
      { r: 0.52, theta: 205 }, { r: 0.28, theta: 265 }, { r: 0.40, theta: 325 },
      { r: 0.48, theta: 55 },  { r: 0.58, theta: 115 }, { r: 0.22, theta: 175 },
      { r: 0.38, theta: 235 }, { r: 0.50, theta: 295 }, { r: 0.56, theta: 355 }
    ];

    // ==========================================
    // 2. 가상 돔 상태(State) 설계 및 동기화
    // ==========================================
    let state = {
      user: null,
      role: null,
      studentName: '',
      roomCodeInput: '',
      currentRoomId: null,
      activeTab: 'main',
      roomData: null,
      participants: [],
      pizzas: [],
      pizzaName: '',
      selectedIngredients: [], 
      hasSubmitted: false,
      buyerWallet: MAX_BUYING_BUDGET,
      purchasedPizzas: [],
      makingQuizAnswer: null,
      alertMessage: null,
      activeQuiz: null,
      studentSessionId: (() => {
        const saved = sessionStorage.getItem('pizza_student_session_id');
        if (saved) return saved;
        const newId = `student_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        sessionStorage.setItem('pizza_student_session_id', newId);
        return newId;
      })()
    };

    function setState(newState) {
      state = { ...state, ...newState };
      render();
    }

    function showAlert(msg) {
      setState({ alertMessage: msg });
    }

    function closeAlert() {
      setState({ alertMessage: null });
    }

    function exitRoom() {
      setState({
        currentRoomId: null,
        role: null,
        roomData: null,
        participants: [],
        pizzas: [],
        hasSubmitted: false,
        selectedIngredients: [],
        pizzaName: '',
        makingQuizAnswer: null
      });
    }

    function parseIngredient(ingStr) {
      const parts = ingStr.split('__');
      const id = parts[0];
      const x = parts[1] !== undefined && !isNaN(parseFloat(parts[1])) ? parseFloat(parts[1]) : null;
      const y = parts[2] !== undefined && !isNaN(parseFloat(parts[2])) ? parseFloat(parts[2]) : null;
      return { id, x, y, raw: ingStr };
    }

    // ==========================================
    // 3. UI 컴포넌트 렌더링 엔진
    // ==========================================

    function getPizzaVisualizerHTML(ingredients = [], size = 'large', isEditable = false) {
      const isLarge = size === 'large';
      const containerClass = isLarge ? "w-56 h-56 md:w-64 md:h-64 border-[10px]" : "w-24 h-24 border-[5px]";
      
      const pizzaToppings = [];
      const sideItems = [];

      ingredients.forEach((ingStr, originalIdx) => {
        const ingObj = parseIngredient(ingStr);
        const ing = INGREDIENTS.find(i => i.id === ingObj.id);
        if (!ing) return;

        if (ing.category === 'side') {
          sideItems.push({ ...ing, originalIdx });
        } else {
          pizzaToppings.push({ ...ingObj, originalIdx });
        }
      });

      let crustHTML = '';
      const activeIds = pizzaToppings.map(o => o.id);
      if (activeIds.includes('cheese_crust')) {
        crustHTML += `<div class="absolute inset-0 rounded-full z-10 pointer-events-none ${isLarge ? 'border-[18px]' : 'border-[8px]'} border-[#FCD973]/70"></div>`;
      }
      if (activeIds.includes('sweet_potato_crust')) {
        crustHTML += `<div class="absolute inset-0 rounded-full z-10 pointer-events-none ${isLarge ? 'border-[18px]' : 'border-[8px]'} border-[#FFD700]/60"></div>`;
      }

      let sauceHTML = '';
      if (activeIds.includes('tomato_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#E05A47]/95 rounded-full absolute shadow-inner"></div>`;
      } else if (activeIds.includes('cream_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#F5F5DC] rounded-full absolute shadow-inner"></div>`;
      } else if (activeIds.includes('bbq_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#8B4513]/80 rounded-full absolute shadow-inner"></div>`;
      }

      let cheeseHTML = '';
      if (activeIds.includes('mozzarella')) {
        cheeseHTML += `<div class="w-[80%] h-[80%] bg-[#FAD054]/90 rounded-full absolute opacity-90 shadow-md" style="background-image: radial-gradient(circle, #FCD973 15%, transparent 15%); background-size: ${isLarge ? '24px 24px' : '12px 12px'};"></div>`;
      }

      let toppingsHTML = '';
      pizzaToppings.forEach((ingObj, loopIdx) => {
        const ingId = ingObj.id;
        const originalIdx = ingObj.originalIdx;
        const ing = INGREDIENTS.find(i => i.id === ingId);
        if (!ing || ing.category === 'sauce' || ing.category === 'edge' || ingId === 'mozzarella') return;

        const isDraggable = (ing.category === 'meat' || ing.category === 'seafood' || ing.category === 'veg');

        let cx = ingObj.x;
        let cy = ingObj.y;
        if (cx === null || cy === null || isNaN(cx) || isNaN(cy)) {
          const presetIdx = (INGREDIENTS.findIndex(i => i.id === ingId) * 5 + loopIdx) % TOPPING_SPREAD_PRESETS.length;
          const pos = TOPPING_SPREAD_PRESETS[presetIdx];
          cx = Math.round(50 + pos.r * 100 * Math.cos(pos.theta * Math.PI / 180));
          cy = Math.round(50 + pos.r * 100 * Math.sin(pos.theta * Math.PI / 180));
        }

        const dragClass = (isEditable && isDraggable) ? "draggable-topping cursor-move" : "";

        // [피드백 적극 반영]: 자잘한 개별 피자 토핑들의 크기를 2배 이상(large 기준 26px, small 기준 13px)으로 대폭 확장 구현!
        toppingsHTML += `
          <div class="absolute ${dragClass}" data-index="${originalIdx}" style="left: ${cx}%; top: ${cy}%; width: 0px; height: 0px; display: flex; align-items: center; justify-content: center; z-index: 20;">
            ${(() => {
              let pieces = '';
              const rPx = isLarge ? 26 : 12; // 군집 폭 확장
              for (let p = 0; p < 6; p++) {
                const angle = (p * 60) * (Math.PI / 180);
                const ox = rPx * Math.cos(angle);
                const oy = rPx * Math.sin(angle);
                pieces += `
                  <div class="absolute select-none font-sans" style="transform: translate(-50%, -50%) translate(${ox}px, ${oy}px) rotate(${p * 45}deg); font-size: ${isLarge ? '26px' : '13px'}; pointer-events: none; line-height: 1;">
                    ${ing.emoji}
                  </div>
                `;
              }
              return pieces;
            })()}
          </div>
        `;
      });

      let placeholderHTML = '';
      if (pizzaToppings.length === 0) {
        placeholderHTML = `
          <div class="absolute inset-0 bg-black/5 flex items-center justify-center text-center p-2">
            <p class="text-orange-950/60 font-black text-[10px] md:text-xs">재료 보관소에서<br>토핑을 담아주세요!</p>
          </div>
        `;
      }

      let sidesHTML = '';
      if (sideItems.length > 0) {
        sidesHTML = `
          <div class="flex flex-col gap-1 items-center justify-center bg-white/90 rounded-2xl p-2.5 border-2 border-orange-200 shadow-sm ${isLarge ? 'h-fit' : 'scale-75 origin-left'}" style="min-width: 70px;">
            <span class="text-[9px] font-black text-orange-800 font-sans">사이드</span>
            <div class="flex flex-wrap gap-1.5 max-w-[90px] justify-center">
              ${sideItems.map((ing, sIdx) => `
                <div class="text-2xl md:text-3xl animate-bounce" style="animation-delay: ${sIdx * 0.1}s;" title="${ing.name}">${ing.emoji}</div>
              `).join('')}
            </div>
          </div>
        `;
      }

      return `
        <div class="flex items-center justify-center gap-4 w-full h-full">
          <div class="rounded-full relative overflow-hidden bg-[#EED8B1] shadow-inner flex items-center justify-center ${containerClass}" style="border-color: #C68B59; flex-shrink: 0;">
            ${crustHTML}
            ${sauceHTML}
            ${cheeseHTML}
            ${toppingsHTML}
            ${placeholderHTML}
          </div>
          ${sidesHTML}
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('app');
      if (!root) return;

      let headerHTML = `
        <header class="bg-orange-100 border-b-4 border-orange-200 shadow-sm sticky top-0 z-40">
          <div class="max-w-6xl mx-auto px-4 py-3.5 flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="window.navTab('main')">
              <span class="text-3xl">🍕</span>
              <div>
                <h1 class="text-xl md:text-2xl font-black text-amber-600 tracking-tight flex items-center gap-1.5">
                  피자나라 경제교실 <span class="text-xs bg-amber-500 text-white font-extrabold px-2 py-0.5 rounded-full">4학년 사회</span>
                </h1>
                <p class="text-xs text-orange-800/80 font-bold font-mono">Real-time Pizza Scarcity Game</p>
              </div>
            </div>
            <div class="flex items-center space-x-3">
              <button onclick="window.navTab('${state.activeTab === 'about' ? 'main' : 'about'}')" class="px-3.5 py-1.5 rounded-full bg-orange-200/80 hover:bg-orange-300 text-orange-950 text-xs font-black transition-all">
                📖 학습 안내도
              </button>
              ${state.currentRoomId ? `
                <div class="flex items-center bg-amber-50 border-2 border-orange-300 rounded-full px-3.5 py-1 text-xs font-black text-orange-700 shadow-inner animate-pulse">
                  🟢 방 번호: ${state.roomData?.code || '......'}
                </div>
              ` : ''}
            </div>
          </div>
        </header>
      `;

      if (state.activeTab === 'about') {
        root.innerHTML = headerHTML + `
          <div class="max-w-4xl mx-auto my-6 p-6 bg-white rounded-3xl border-4 border-orange-200 shadow-xl mx-4 animate-scale-up">
            <h2 class="text-2xl font-black text-orange-950 mb-4 flex items-center"><span class="text-3xl mr-2">📚</span> 자원의 희소성과 선택이란?</h2>
            <div class="space-y-4 text-slate-600 leading-relaxed text-sm md:text-base">
              <p>우리가 갖고 싶은 고품질 토핑은 가득하지만, 이를 가질 수 있는 <strong>예산(돈)은 언제나 한계</strong>가 있습니다. 이를 경제학에서 <strong>'자원의 희소성'</strong>이라고 부릅니다.</p>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-4">
                <div class="p-4 rounded-2xl bg-orange-50/50 border-2 border-orange-100">
                  <h3 class="font-extrabold text-orange-900 mb-2">🧑‍🍳 1단계: 피자 만들기 (최대 예산 30,000원)</h3>
                  <p class="text-xs leading-relaxed">나의 최대 재료비 연구 한도는 <strong>30,000원</strong>입니다. 맛있는 재료들을 예산 안에서 수량 조절해 가며 최선의 조합을 발명해 마켓에 입고시켜 보세요!</p>
                </div>
                <div class="p-4 rounded-2xl bg-amber-50/50 border-2 border-amber-200">
                  <h3 class="font-extrabold text-amber-900 mb-2">🛒 2단계: 피자 마켓 (최대 예산 50,000원)</h3>
                  <p class="text-xs leading-relaxed">친구들의 다양한 피자가 익명으로 출시됩니다! 주어진 용돈 <strong>50,000원</strong> 안에서 가장 마음에 드는 가성비 좋은 피자들을 수량 제한 없이 풍성하게 구매해 보세요.</p>
                </div>
              </div>
            </div>
          </div>
        ` + getFooterHTML() + getAlertModalHTML();
        return;
      }

      let bodyContentHTML = '';

      if (!state.currentRoomId) {
        bodyContentHTML = `
          <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 my-6 items-center max-w-6xl w-full mx-auto p-4">
            <div class="lg:col-span-7 space-y-6 text-center lg:text-left">
              <div class="inline-block bg-orange-100 text-orange-900 px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase border border-orange-200">초등학교 4학년 사회 단원 연계 피자 놀이교실 🍕</div>
              <h2 class="text-3xl md:text-5xl font-black text-slate-800 leading-tight">피자 가게를 운영하며<br><span class="text-orange-500">배우는 자원의 희소성!</span></h2>
              <p class="text-slate-600 text-sm md:text-base leading-relaxed">맛있고 호화로운 고기, 치즈 크러스트 토핑을 듬뿍 넣고 싶지만 우리에게 주어진 제작 및 쇼핑 비용은 정해져 있어요.<br class="hidden md:inline">한정된 자원을 배합해 시장의 마음을 사로잡을 시그니처 피자왕이 되어봅시다!</p>
            </div>
            <div class="lg:col-span-5 bg-white rounded-3xl border-4 border-orange-200 shadow-xl p-6 md:p-8 space-y-6">
              <div class="space-y-4">
                <h3 class="text-lg font-black text-slate-800 flex items-center"><span class="bg-orange-200 text-orange-900 w-6 h-6 rounded-full flex items-center justify-center text-xs font-black mr-2">학생</span>학생으로 입장하기 👨‍🍳</h3>
                <div class="space-y-3">
                  <div>

    // ==========================================
    function setupDragListeners() {
      const container = document.getElementById('pizza-visualizer-container');
      if (!container) return;

      let draggingIdx = null;
      let containerRect = null;

      const onDragStart = (e, index) => {
        if (e.type === 'touchstart' && e.touches.length > 1) return;
        if (e.type === 'mousedown' && e.button !== 0) return;

        draggingIdx = index;
        containerRect = container.getBoundingClientRect();
        if (e.type === 'mousedown') e.preventDefault();
      };

      const onDragMove = (e) => {
        if (draggingIdx === null || !containerRect) return;
        if (e.cancelable) e.preventDefault();

        const cX = e.touches ? e.touches[0].clientX : e.clientX;
        const cY = e.touches ? e.touches[0].clientY : e.clientY;

        let xp = ((cX - containerRect.left) / containerRect.width) * 100;
        let yp = ((cY - containerRect.top) / containerRect.height) * 100;

        // 원형 안전반경 필터 클램핑 (r=40% 이내 가두기)
        const dx = xp - 50;
        const dy = yp - 50;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 40) {
          xp = 50 + (dx / dist) * 40;
          yp = 50 + (dy / dist) * 40;
        }
        xp = Math.max(5, Math.min(95, xp));
        yp = Math.max(5, Math.min(95, yp));

        const targetEl = container.querySelector(`[data-index="${draggingIdx}"]`);
        if (targetEl) {
          targetEl.style.left = `${xp}%`;
          targetEl.style.top = `${yp}%`;
        }
      };

      const onDragEnd = () => {
        if (draggingIdx === null) return;
        const targetEl = container.querySelector(`[data-index="${draggingIdx}"]`);
        if (targetEl) {
          const fx = parseFloat(targetEl.style.left);
          const fy = parseFloat(targetEl.style.top);

          const updated = [...state.selectedIngredients];
          const ingObj = parseIngredient(updated[draggingIdx]);
          updated[draggingIdx] = `${ingObj.id}__${Math.round(fx)}__${Math.round(fy)}`;
          
          state.selectedIngredients = updated;
          render(); // 최종 좌표 동기화 돔 드로잉
        }
        draggingIdx = null;
        containerRect = null;
      };

      const draggables = container.querySelectorAll('.draggable-topping');
      draggables.forEach(item => {
        const idx = parseInt(item.getAttribute('data-index'));
        item.addEventListener('mousedown', (e) => onDragStart(e, idx));
        item.addEventListener('touchstart', (e) => onDragStart(e, idx), { passive: false });
      });

      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('touchmove', onDragMove, { passive: false });
      window.addEventListener('mouseup', onDragEnd);
      window.addEventListener('touchend', onDragEnd);

      window.activeDragCleanup = () => {
        window.removeEventListener('mousemove', onDragMove);
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('mouseup', onDragEnd);
        window.removeEventListener('touchend', onDragEnd);
      };
    }

                    <td class="p-2 border-r border-slate-200 font-bold">${pizza.creatorName}</td>
                    <td class="p-2 border-r border-slate-200">${pizza.name}</td>
                    <td class="p-2 border-r border-slate-200 font-mono">₩${pizza.price.toLocaleString()}</td>
                    <td class="p-2 border-r border-slate-200 text-center font-bold text-slate-800">${pizza.buyers?.length || 0}판</td>
                    <td class="p-2 border-r border-slate-200 text-center font-bold text-orange-600">₩${((pizza.buyers?.length || 0) * pizza.price).toLocaleString()}</td>
                    <td class="p-2 text-slate-500 italic text-[10px]">${buyerNames || '기록 없음'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    const baseSetState = setState;
    setState = function(newState) {
      if (window.activeDragCleanup) window.activeDragCleanup();
      baseSetState(newState);
      if (state.role === 'student' && state.roomData?.status === 'making' && !state.hasSubmitted) {
        setupDragListeners();
      }
    };
  </script>
</body>
</html>
